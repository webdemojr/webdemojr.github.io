<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="initial-scale=1.0">
    <link rel="stylesheet" href="/css/root.css">
    <link rel="stylesheet" href="/css/setup.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/phosphor-icons"></script>
    <title>Todo App</title>
</head>
<body class=''>

    <div class="full-cover display-none"></div>

    

    <div class="main-container">

        <div class="user-launch">
            <div class="user-launch-initial">
                <div class="user-launch-greeting">
                    <div class='user-launch-greeting-text'><span class="user-launch-greeting-text-icon"><i class='' style='color:#f0c73d'></i></span>Good <span class="user-launch-greeting-text-time">evening</span>, <span class="user-launch-name">Jason</span></div>
                    <div class="user-launch-greeting-date"></div>
                </div>
            </div>
        </div>

        <!-- <div class="utility-belt-edge">
            <div class="user-home user-utility-belt-active"><i class="ph-house"></i></div>
            <div class="user-categories"><i class="ph-hash"></i></div>
            <div class="user-shop"><i class="ph-shopping-cart-simple"></i></div>
            <div class="user-profile"><i class="ph-user-circle"></i></div>
        </div> -->

        


        <div class="dashboard">
            <div class="dashboard-card dashboard-card-lg today">
                <div class="dashboard-card-title">
                    <h2>Today's List - <span class='number-of-today-tasks'></span> Task(s)</h2>
                </div>
                <div class="dashboard-card-content">
                    <div class="today-list">
          
                    </div>
                </div>
            </div><div class="dashboard-card dashboard-card-sm user-stats">

            </div><div class="dashboard-card dashboard-card-md categories">
                <div class="dashboard-card-title">
                    <h2>My Categories</h2>
                </div>
                <div class="dashboard-card-content">
                    <div class="categories-list">
    
                    </div>
                </div>
            </div><div class="dashboard-card dashboard-card-md shop">

            </div>
        </div>

        <div class="creator-container">
            <div class="creator creator-hide">
                <div class="creator-input-top">
                    <input type="text" id="CreatorInput" placeholder="Start here..." maxlength="280">
                </div>
                <div class="creator-input-bottom">
                    <div class="entry-type">
                        <span class="entry-inside-container">
                            <span class="entry-text-and-icon selected-icon entry-category">
                                <i class="ph-hash ph-md"></i>
                            </span>
                            <span class="entry-text-and-icon entry-task">
                                <i class="ph-check-circle ph-md"></i>
                            </span>
                        </span>
                    </div><div class="entry-time">
                        <span class="entry-inside-container">
                            <span class="entry-text-and-icon selected-icon entry-now">
                                <i class="ph-arrow-circle-down ph-md"></i>
                            </span>
                            <span class="entry-text-and-icon entry-later">
                                <i class="ph-timer ph-md"></i>
                            </span>
                        </span>
                    </div>
                </div>
                <div class="clrs-container"></div>
                <div class="ctgrs-container no-ctgr-selected"></div>
                
                <button class="creator-button">Add <span class="creator-button-name">Category</span></button>
            </div>
    
            <div class="creator-message">
                Successfully Added!
            </div>
        </div>



        <div class="specific-category display-none">
            <div class="specific-category-header">
                <div class="go-back">← Back</div>
                <div class="specific-category-actions">
                    <div id="" class="specific-category-edit"><i class="ph-pencil"></i></div>
                    <div id="" class="specific-category-delete"><i class="ph-trash"></i></div>
                </div>
            </div>
            <h2><span class='specific-category-hashtag'><i class="ph-hash"></i></span><span class='specific-category-title'></span></h2>
            <div class="specific-category-tasks">

            </div>
        </div>

    </div>


    <div class="user-utility-belt">
        
        <div class="utility-belt-solo">
            <div class="user-create"><i class="ph-plus"></i></div>
        </div>
    </div>


    <div class="options-selector display-none">
        <div class="invisible"></div>
        <div class="options-selector-inner-container">


            <div class="close-options">
                <i class="ph-x"></i>
            </div>
            <h2>My Categories</h2>
            <div class="options-selector-items-list">

            </div>
        </div>

    </div>

    <div class="edit-specific-category-window display-none">
        <div class="invisible"></div>
        
        <div class="edit-specific-category-window-inner-container">
            <div class="close-edit-specific-category">
                <i class="ph-x"></i>
            </div>
            <h4>Edit Category Title & Color</h4>
            <input class="edit-specific-category-window-input" type="text" placeholder="New Title for Category" maxlength="280">
            <div class="edit-specific-category-window-clrs-container"></div>
            <button class="submit-new-category">Save Edit</button>
        </div>
    </div>
    <div class="invisible"></div>
    

    
    <script src="https://code.jquery.com/jquery-3.6.0.js" integrity="sha256-H+K7U5CnXl1h5ywQfKtSj8PCmoN9aaq30gDh27Xc0jk=" crossorigin="anonymous"></script>
    <script src="script.js" type="module"></script>
</body>
</html>
