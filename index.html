<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="initial-scale=1.0">
    <link rel="stylesheet" href="/css/root.css">
    <link rel="stylesheet" href="/css/setup.css">
    <link rel="stylesheet" href="style.css">
    
    <title>Todo App</title>
</head>
<body>

    <div class="main-container">
        <div class="header-container">
            <div class="header-row-container header-first-row-container">
                <div class="logo">ToDoApp</div><div class="profile">Jason</div>
            </div>
            <div class="header-row-container header-second-row-container">
                <div class="shop">🛒 Shop</div><div class="user-profile-stats">
                    <div class="user-wallet-amount">100 <span class='user-wallet-icon'>🍉</span></div><div class="user-profile-stat-level">2 🎖</div>
                </div>
            </div>
        </div>


        <div class="category-container">
            <h2>My Categories</h2>
            <div class="create-category">

                <input tabindex="1" id="InputCategory" class="input-outline-idle" type="text" placeholder="Create New Category." maxlength="16"/><button tabindex="2" class="button-add-category button-outline-accent">+</button>
                <div class="category-list">
            
                </div>
            </div>
        </div>

        <div class="tasks-container specific-category display-none">
            <div class="category-header"><div class="go-back go-back-from-task">← Back</div><div class="category-details">
                <div class="specific-category-edit specific-category-button button-outline-accent">Edit</div><div class="specific-category-delete specific-category-button button-outline-danger"><img src="assets/icons/delete-red.svg"></div>
            </div>
            </div>
            
            <h2></h2>
            

            <input tabindex="3" id="InputTask" type="text" class="input-outline-idle" placeholder="Type your task here."/><button tabindex="5" class="button-add-task">+</button>

            <div class="task-list">

            </div>
        </div>

    </div>





    <!-- <div class="specific-category display-none">
        <h2></h2>
        
    </div> -->

    
    <script src="https://code.jquery.com/jquery-3.6.0.js" integrity="sha256-H+K7U5CnXl1h5ywQfKtSj8PCmoN9aaq30gDh27Xc0jk=" crossorigin="anonymous"></script>
    <script src="script.js" type="module"></script>
</body>
</html>
