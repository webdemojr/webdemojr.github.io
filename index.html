        <div class="category-container">
            <h2>My Categories</h2>
            <div class="create-category">

                <input tabindex="1" id="InputCategory" class="input-outline-idle" type="text" placeholder="Create New Category." maxlength="16"/><button tabindex="2" class="button-add-category button-outline-accent">+</button>
                <div class="category-list">
            
                </div>
            </div>
        </div>

        <div class="tasks-container specific-category display-none">
            <div class="go-back-from-task">← Go Back</div>
            <h2></h2>
            <div class="specific-category-delete">Delete Category</div>

            <input tabindex="3" id="InputTask" type="text" placeholder="Input task here."/>
            <select tabindex="4" name="importance" id="ImportanceDropDown">
                <option value="Low Importance">Low Importance</option>
                <option value="Medium Importance">Medium Importance</option>
                <option value="High Importance">High Importance</option>
            </select>
            <button tabindex="5" class="button-add-task">Add Task</button>

            <div class="task-list">

            </div>
        </div>
